    <!-- DAILY VIEW — current Daily Reading page. Hidden when the user
         switches to Settings (or any future sibling view). The view
         router is showView() in JS; it only toggles `hidden` between
         #dailyView and #settingsView, never re-renders the inner DOM,
         so all per-tab state (filters, scroll position, search) survives
         a round-trip into Settings and back. -->
    <div class="content" id="dailyView">
      <!-- WATCHLISTS — sits ABOVE the "Daily Reading" heading per spec.
           Moving the card above the title means the watchlist scope (which
           drives every tab below) reads as a global control, applied first,
           before the user even sees the page title. All wiring (chip toggle,
           Reset to Default, the active-count badge) is unchanged — this is
           a pure DOM reorder. -->
      <section class="card wl-card">
        <div class="wl-top">
          <div class="wl-left">
            <div class="wl-title">Watchlists</div>
            <span class="wl-active-badge"><span id="wlActiveCount" class="num">1</span> active</span>
          </div>
          <button id="wlReset" class="wl-reset">Reset to Default</button>
        </div>
        <div class="wl-chips" id="wlChips"></div>
      </section>

      <div class="page-title-row">
        <div>
          <h1>Daily Reading</h1>
        </div>
      </div>

      <!-- DAILY READING GLOBAL SEARCH — prominent search bar with scope
           toggles and card-based results below. Replaces the previous
           compact dropdown-style search. -->
      <section class="dr-search-section" aria-label="Daily Reading global search">
        <div class="dr-search-bar" id="drSearchBar">
          <svg class="dr-search-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="drSearchInput" type="text" placeholder="Search across announcements, reports, TV bytes…" autocomplete="off" spellcheck="false" />
          <div class="dr-scope-pills" role="group" aria-label="Search scope">
            <button class="dr-scope-pill active" data-scope="all"           type="button" aria-pressed="true">All</button>
            <button class="dr-scope-pill"        data-scope="announcements" type="button" aria-pressed="false">Announcements</button>
            <button class="dr-scope-pill"        data-scope="reports"       type="button" aria-pressed="false">Reports</button>
            <button class="dr-scope-pill"        data-scope="tv"            type="button" aria-pressed="false">MGMT TV</button>
          </div>
          <button class="dr-search-btn" id="drSearchBtn" type="button">Search</button>
        </div>
        <div class="dr-search-results" id="drSearchResults" hidden></div>
      </section>

      <!-- TABS -->
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="announcements">Corp Announcement <span class="tcnt">0</span></button>
        <button class="tab" data-tab="reports">Reports <span class="tcnt">0</span></button>
        <button class="tab" data-tab="tvbytes">Mgmt TV Bytes <span class="tcnt">0</span></button>
      </div>

      <!-- PANEL -->
      <div id="panel"></div>

    </div>

    <!-- SETTINGS VIEW — sibling of #dailyView. The eyebrow + title +
         tabs are static; #settingsPanel is populated by renderSettingsPanel()
         based on state.settings.tab. Profile is the default and the only
         tab with built-out content; the others render a brief placeholder.
         Form state lives in state.settings.profile and is mirrored to
         localStorage('omkara.settings') so it survives reloads until a
         real backend is wired. -->
    <div class="content settings-view" id="settingsView" hidden>
      <h1 class="settings-title">Settings</h1>
      <div class="settings-tabs" id="settingsTabs" role="tablist" aria-label="Settings sections">
        <button class="s-tab active" data-stab="profile"       type="button" role="tab" aria-selected="true">Profile</button>
        <button class="s-tab"        data-stab="watchlists"    type="button" role="tab" aria-selected="false">Watchlists</button>
        <button class="s-tab"        data-stab="notifications" type="button" role="tab" aria-selected="false">Notifications</button>
        <button class="s-tab"        data-stab="password"      type="button" role="tab" aria-selected="false">Password</button>
      </div>
      <div id="settingsPanel"></div>
    </div>

    <!-- COMPANY VIEW — third sibling under <main>, opened when the user
         picks a result from the topbar search. Only the company name +
         tickers + sector text bind dynamically (from state.company.data);
         the financial table / peer table / KPI numbers are demo content
         shipping with the visual scaffold, to be wired to a real
         per-company data API in a later pass. The skeleton is built
         once by renderCompanyShell(); subsequent selections only update
         the dynamic strings via renderCompanyDynamic(). -->
    <div class="content" id="companyView" hidden>
      <div id="companyShell"></div>
      <!-- Forensic page tab bar + Single Page tables. Shown only in the
           Forensic (header-only) flow, below the company header card. -->
      <div id="forensicPage" hidden></div>
    </div>

    <!-- FORENSIC LANDING — shown when the Forensic nav is clicked but no
         company is selected yet. Prompts the user to pick a company from the
         top search bar; once selected, selectCompany() opens the Company
         view directly on its Forensic tab. -->
    <div class="content" id="forensicView" hidden>
      <div class="forensic-empty">
        <div class="forensic-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </div>
        <h1 class="forensic-empty-title">Forensic</h1>
        <p class="forensic-empty-sub">Search and select a company from the search bar above to view its forensic analysis.</p>
        <button type="button" class="forensic-empty-cta" id="forensicSearchCta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Select a company
        </button>
